<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Management</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet" />
</head>

<body>
    <!-- Employee Section -->
    <div class="container py-5" id="employeeSection">
        <h1 class="mb-4 text-center title-gradient">Employee Management</h1>
        <ul class="nav nav-pills mb-4 justify-content-center" id="managementTabs">
            <li class="nav-item">
                <a class="nav-link active" href="#" onclick="showSection('employee')">Employees</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="showSection('department')">Departments</a>
            </li>
        </ul>
        <div class="d-flex justify-content-between align-items-center mb-3 gap-2">
            <input type="text" id="searchInput" class="form-control" style="max-width: 320px;"
                placeholder="Search by name or department..." oninput="filterEmployees()" />
            <select class="form-select" id="statusFilter" style="max-width: 160px;" onchange="applyStatusFilter()">
                <option value="all">All Status</option>
                <option value="active" selected>Active</option>
                <option value="inactive">Inactive</option>
            </select>
            <button class="btn btn-primary ms-auto" data-bs-toggle="modal" data-bs-target="#employeeModal"
                onclick="openAddEmployee()">
                <i class="bi bi-plus-lg me-1"></i>Add Employee
            </button>
        </div>
        <div class="table-responsive glass-table">
            <table class="table table-hover mb-0" id="employeesTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Mobile</th>
                        <th>Job Title</th>
                        <th>Department</th>
                        <th>Hire Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="employeesBody">
                    <!-- Rows will be injected by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Department Section (hidden initially) -->
    <div class="container py-5" id="departmentSection" style="display:none;">
        <h1 class="mb-4 text-center title-gradient">Departments</h1>
        <ul class="nav nav-pills mb-4 justify-content-center">
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="showSection('employee')">Employees</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="#" onclick="showSection('department')">Departments</a>
            </li>
        </ul>
        <div class="d-flex justify-content-end mb-3">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#departmentModal"
                onclick="openAddDepartment()">
                <i class="bi bi-plus-lg me-1"></i>Add Department
            </button>
        </div>
        <div class="table-responsive glass-table">
            <table class="table table-hover mb-0" id="departmentsTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="departmentsBody">
                    <!-- Rows will be injected by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Department Modal -->
    <div class="modal fade" id="departmentModal" tabindex="-1" aria-labelledby="departmentModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content glass-modal">
                <div class="modal-header border-0">
                    <h5 class="modal-title" id="departmentModalLabel">Add Department</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="departmentForm">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" id="deptName" required />
                        </div>
                        <input type="hidden" id="deptIndex" />
                    </form>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="saveDepartment()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Employee Modal -->
    <div class="modal fade" id="employeeModal" tabindex="-1" aria-labelledby="employeeModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content glass-modal">
                <div class="modal-header border-0">
                    <h5 class="modal-title" id="employeeModalLabel">Add Employee</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="employeeForm">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="empName" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="empEmail" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mobile Number</label>
                            <input type="tel" class="form-control" id="empMobile" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Job Title</label>
                            <input type="text" class="form-control" id="empJobTitle" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Department</label>
                            <select class="form-select" id="empDept" required>
                                <option value="" disabled selected>Select department</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Hire Date</label>
                            <input type="date" class="form-control" id="empHireDate" required />
                        </div>
                        <div class="mb-3 form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="empIsActive" checked />
                            <label class="form-check-label" for="empIsActive">Active</label>
                        </div>
                        <input type="hidden" id="empIndex" />
                    </form>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="saveEmployee()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <!-- Bootstrap JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Toast Container -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
        <div id="appToast" class="toast align-items-center border-0" role="alert" aria-live="assertive"
            aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastBody"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="js/app.js"></script>
</body>

</html>
